name: koperasi_kantin_pro
description: "SekolahPRO - App Merchant untuk Kantin & Koperasi Sekolah"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.0.0
  
  # Navigation
  go_router: ^13.0.0
  
  # HTTP & API
  dio: ^5.3.0
  
  # Local Storage
  shared_preferences: ^2.2.0
  hive: ^2.2.0
  hive_flutter: ^1.1.0
  
  # QR Code
  qr_code_scanner: ^1.0.1
  qr_flutter: ^4.1.0
  
  # Image & Media
  image_picker: ^1.0.0
  cached_network_image: ^3.3.0
  
  # PDF Export
  pdf: ^3.10.0
  printing: ^5.11.0
  
  # Notifications
  flutter_local_notifications: ^15.0.0
  
  # Date & Time
  intl: ^0.19.0
  
  # Utils
  uuid: ^4.0.0
  crypto: ^3.0.0
  
  # UI
  flutter_svg: ^2.0.0
  lottie: ^2.7.0
  shimmer: ^3.0.0
  
  # Database
  sqflite: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/logos/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
